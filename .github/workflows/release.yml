name: Release Management

on:
  push:
    branches:
      - master
    paths:
      - 'package.json'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.version.outputs.should_release }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version change
        id: version
        run: |
          # Get previous and current versions
          PREVIOUS_VERSION=$(git show HEAD^:package.json 2>/dev/null | grep '"version"' | sed 's/.*"version": "\([^"]*\)".*/\1/' || echo "0.0.0")
          CURRENT_VERSION=$(cat package.json | grep '"version"' | sed 's/.*"version": "\([^"]*\)".*/\1/')
          
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          
          if [ "$PREVIOUS_VERSION" != "$CURRENT_VERSION" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Version changed from $PREVIOUS_VERSION to $CURRENT_VERSION"
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Version unchanged at $CURRENT_VERSION"
          fi

  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: create-release
    if: needs.create-release.outputs.should_release == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate conventional changelog
        run: |
          npm install -g conventional-changelog-cli
          conventional-changelog -p angular -i CHANGELOG.md -s
        continue-on-error: true

      - name: Commit changelog
        run: |
          if [ -n "$(git status --short CHANGELOG.md)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add CHANGELOG.md
            git commit -m "docs: update changelog for v${{ needs.create-release.outputs.version }}"
            git push
          fi
        continue-on-error: true

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [create-release, generate-changelog]
    if: needs.create-release.outputs.should_release == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release notes
        id: notes
        run: |
          NOTES=$(git log --pretty=format:"%h - %s" $(git describe --tags --abbrev=0 2>/dev/null || echo "HEAD~10")..HEAD | head -20)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          name: Release v${{ needs.create-release.outputs.version }}
          body: |
            ## What's Changed
            
            ${{ steps.notes.outputs.notes }}
            
            **Full Changelog**: ${{ github.server_url }}/${{ github.repository }}/compare/$(git describe --tags --abbrev=0 2>/dev/null || echo 'main')...v${{ needs.create-release.outputs.version }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-release:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [create-release, create-github-release]
    if: always()

    steps:
      - name: Release notification
        run: |
          echo "## Release v${{ needs.create-release.outputs.version }} 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.create-github-release.result }}" == "success" ]; then
            echo "✅ Release created successfully!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "[View Release](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.create-release.outputs.version }})" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Release creation skipped or failed" >> $GITHUB_STEP_SUMMARY
          fi
