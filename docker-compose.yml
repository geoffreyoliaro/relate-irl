version: "3.9"

services:
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6379:6379"
    volumes:
      - falkordb_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: "6379"
      FALKORDB_PASSWORD: ""
      JWT_SECRET: "local-dev-secret-change-in-prod"
      # Point to your Xano instance — for local demo you can mock this
      XANO_API_BASE: "https://your-instance.xano.io/api:xxxx"
      GIN_MODE: debug
    depends_on:
      falkordb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  falkordb_data:
